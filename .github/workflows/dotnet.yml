name: CI

# Build / test gate. Runs on every PR and on demand.
#
# Packaging and release live in release.yml (NuGet packages + the migrator tool) —
# this workflow intentionally does NOT pack or upload artifacts, so the two don't
# duplicate each other.
#
# Note: there is deliberately no `dotnet format --verify-no-changes` gate. The repo's
# hand-maintained style (e.g. space-before-paren) does not match what `dotnet format`
# would impose, so that check reports thousands of pre-existing findings and cannot pass
# without a disruptive repo-wide reformat. Re-add it only after committing to that reformat.

on: [pull_request, workflow_dispatch]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # Builds the whole solution in Release on every OS — this is the cross-platform
      # compile gate (Release also turns on TreatWarningsAsErrors + doc generation).
      - name: Build
        run: dotnet build --configuration Release

      # Tests run on Windows only (matching the original setup); the build step above
      # already proves the suite compiles on Linux and macOS.
      - name: Test
        if: runner.os == 'Windows'
        run: dotnet test --configuration Release --no-build
