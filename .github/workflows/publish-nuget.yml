name: Publish to nuget.org

# Publishes the Majorsilence.Forms NuGet packages to nuget.org, using Trusted Publishing
# (OIDC) -- no long-lived API key is stored in this repo.
#
# Trigger: only when a human clicks "Publish release" on a GitHub Release (release.yml
# creates these as drafts on a tag push). Publishing a draft is the deliberate manual
# approval gate; nothing publishes to nuget.org just from pushing a tag or to main.
#
# One-time setup required on nuget.org (see MIGRATION-NOTES.md / repo docs):
#   1. nuget.org -> your username -> Trusted Publishing -> add policy
#        Repository Owner: majorsilence
#        Repository:       Modern.Forms
#        Workflow File:     publish-nuget.yml
#        Environment:       (leave blank; this workflow doesn't use one)
#   2. No GitHub secret needed for the API key. NUGET_USER below can be a plain repo
#      variable (vars.NUGET_USER) or a secret if you'd rather not expose the nuget.org
#      username in workflow runs -- either works, it's not sensitive on its own.

on:
  release:
    types: [published]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  PACKABLE_PROJECTS: >-
    src/Majorsilence.Forms/Majorsilence.Forms.csproj
    src/Majorsilence.Forms.Avalonia/Majorsilence.Forms.Avalonia.csproj
    src/Majorsilence.Forms.Headless/Majorsilence.Forms.Headless.csproj
    src/Majorsilence.Forms.Uno/Majorsilence.Forms.Uno.csproj
    src/Majorsilence.Forms.Telerik/Majorsilence.Forms.Telerik.csproj
    src/Majorsilence.Forms.Drawing.Common/Majorsilence.Forms.Drawing.Common.csproj
    tools/Majorsilence.Forms.Templates/Majorsilence.Forms.Templates.csproj

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet/login's OIDC token exchange
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the exact tag the release points at, not whatever HEAD happens to
          # be -- release.yml already validated this tag builds the released artifacts.
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Pack NuGet packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p nupkg
          for proj in $PACKABLE_PROJECTS; do
            echo "::group::pack $proj"
            dotnet pack "$proj" --configuration Release --output nupkg
            echo "::endgroup::"
          done
          ls -lh nupkg

      # Exchanges this job's short-lived GitHub OIDC token for a ~1-hour nuget.org API
      # key, per the Trusted Publishing policy configured on nuget.org (see header comment).
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to nuget.org
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget push "nupkg/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
